<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forage Certificate Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .home-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .btn {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="home-card">
        <h1 style="color: var(--primary-color); margin-bottom: 20px;">Certificate Verification System</h1>
        <p style="color: var(--text-main); line-height: 1.6;">Welcome to the portal. You can verify a certificate by scanning its QR code or logging in below to view your certificates.</p>
        <a href="{{ url_for('login') }}" class="btn">Login to Dashboard</a>
    </div>
</body>
</html>
